<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenEdit — Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px 24px;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .page {
      max-width: 860px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1c1917;
      margin: 0 0 8px;
    }
    .subtitle {
      color: #78716c;
      margin: 0 0 32px;
      font-size: 15px;
    }
    #editor {
      /* OpenEdit mounts here */
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e7e5e4;
      background: #fff;
      color: #57534e;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover { background: #f5f5f4; color: #1c1917; }
    .btn-primary {
      background: #1c1917;
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { background: #292524; }
    .output {
      margin-top: 24px;
      background: #1c1917;
      color: #a5f3fc;
      border-radius: 12px;
      padding: 20px 24px;
      font-family: "Fira Code", monospace;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #e7e5e4;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeBtn">☾ Dark</button>

  <div class="page">
    <h1>OpenEdit</h1>
    <p class="subtitle">Lightweight WYSIWYG editor</p>

    <div id="editor"></div>

    <div class="actions">
      <button class="btn" id="btnGetHTML">Get HTML</button>
      <button class="btn" id="btnGetMD">Get Markdown</button>
      <button class="btn" id="btnSetMD">Load Markdown</button>
      <button class="btn" id="btnSetHTML">Replace content</button>
      <button class="btn" id="btnClear">Clear</button>
      <button class="btn btn-primary" id="btnSave">Save (Console)</button>
    </div>

    <pre class="output" id="output"></pre>
  </div>

  <!-- UMD build — no Vite, no build step required -->
  <script src="dist/open-edit.umd.js"></script>
  <script>
    const OpenEdit = window.OpenEdit;

    const INITIAL_HTML = `
<h1>OpenEdit — The Modern WYSIWYG Editor</h1>
<p>open-edit is a lightweight, open source WYSIWYG editor in the spirit of TinyMCE and CKEditor — without the bulk. MIT-licensed, zero external dependencies.</p>
<h2>Slash Commands (New!)</h2>
<p>Type <code>/</code> at the start of any block to open the command menu — just like Notion. Use arrow keys to navigate, <kbd>Enter</kbd> or <kbd>Tab</kbd> to insert, <kbd>Esc</kbd> to dismiss.</p>
<div class="oe-callout oe-callout-info" data-callout-variant="info"><strong>Try it:</strong> Type <code>/h2</code>, <code>/bullet</code>, <code>/code</code>, <code>/warning</code> — or just <code>/</code> to browse all 15+ block types.</div>
<h2>Callout Blocks</h2>
<p>Insert callouts via the block-type dropdown, toolbar button, or slash commands (<code>/callout</code>, <code>/success</code>, <code>/warning</code>, <code>/danger</code>):</p>
<div class="oe-callout oe-callout-success" data-callout-variant="success">This is a <strong>Success</strong> callout.</div>
<div class="oe-callout oe-callout-warning" data-callout-variant="warning">This is a <strong>Warning</strong> callout.</div>
<div class="oe-callout oe-callout-danger" data-callout-variant="danger">This is a <strong>Danger</strong> callout.</div>
<h2>More Features</h2>
<ul>
  <li>🎨 <strong>Syntax Highlighting</strong> for code blocks (highlight.js, CDN)</li>
  <li>😀 <strong>Emoji Picker</strong> via toolbar button (no external package)</li>
  <li>📝 <strong>Markdown Import/Export</strong> — <code>editor.getMarkdown()</code> / <code>editor.setMarkdown()</code></li>
  <li>🏷️ <strong>Template Tags</strong> — <code>{{variablename}}</code> rendered as pill badges</li>
  <li>📋 <strong>Clipboard Intelligence</strong> — URL paste → link, Markdown paste → formatted text</li>
</ul>
<h2>Code Example with Syntax Highlighting</h2>
<pre><code class="language-typescript">import { OpenEdit } from 'open-edit';

const editor = OpenEdit.create('#editor', {
  placeholder: 'Start typing…',
  onChange: (html) =&gt; console.log(html),
});
</code></pre>
<h2>Template Tags Demo</h2>
<p>Hello {{firstname}} {{lastname}}, welcome to {{company}}! Your order {{ordernr}} will be delivered on {{deliverydate}}.</p>
<blockquote>
<p>Clean, semantic HTML — no vendor lock-in, no proprietary format.</p>
</blockquote>
`;

    let currentTheme = 'light';

    const { plugins } = OpenEdit;

    const editor = OpenEdit.create('#editor', {
      content: INITIAL_HTML,
      placeholder: 'Start typing…',
      //toolbarItems: ['bold', 'italic', 'underline', 'link'],
      //statusBar: false,
      //locale: OpenEdit.locales.de,
      theme: currentTheme,
      onChange: (html) => {
        // Live update (optional)
      },
      onImageUpload: async (file) => {
        // Demo: use a data URL (in production: upload to server)
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(file);
        });
      },
    });

    // K1 — Syntax Highlighting
    editor.use(plugins.highlight());

    // K4 — Emoji Picker
    editor.use(plugins.emoji());

    // K13 — Template Tags
    editor.use(plugins.templateTags());

    // Callout — Block-Plugin
    editor.use(plugins.callout());

    // Slash Commands — Notion-style "/" menu
    editor.use(plugins.slashCommands());

    // N1 — AI Assistant (disabled — add your API key to enable)
    // editor.use(plugins.ai({ apiKey: 'sk-ant-...' }));

    // ── Action buttons ────────────────────────────────────────────────────
    const output = document.getElementById('output');

    document.getElementById('btnGetHTML').addEventListener('click', () => {
      output.style.display = 'block';
      output.textContent = editor.getHTML();
    });

    document.getElementById('btnGetMD').addEventListener('click', () => {
      output.style.display = 'block';
      output.textContent = editor.getMarkdown();
    });

    document.getElementById('btnSetMD').addEventListener('click', () => {
      const sampleMd = `# Hello from Markdown!

This is a **bold** and *italic* paragraph with a [link](https://example.com).

## Code Example

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet('World'));
\`\`\`

## List

- Item one
- Item two with \`inline code\`
- Item three

1. First step
2. Second step
3. Third step

> A blockquote with **important** text.

---

*End of document.*`;
      editor.setMarkdown(sampleMd);
      output.style.display = 'none';
    });

    document.getElementById('btnSetHTML').addEventListener('click', () => {
      editor.setHTML('<h2>New Content</h2><p>This content was inserted via <code>setHTML()</code>.</p>');
      output.style.display = 'none';
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      editor.setHTML('<p></p>');
      output.style.display = 'none';
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      const html = editor.getHTML();
      console.log('Saved HTML:', html);
      alert('HTML logged to console!');
    });

    // ── Theme toggle ──────────────────────────────────────────────────────
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.getElementById('editor').querySelector('.oe-container')
        .setAttribute('data-oe-theme', currentTheme);
      themeBtn.textContent = currentTheme === 'light' ? '☾ Dark' : '☀ Light';
      document.body.style.background = currentTheme === 'dark' ? '#0c0a09' : '#f5f5f4';
      document.body.style.color = currentTheme === 'dark' ? '#e7e5e4' : '';
    });

    // Demo plugin: Word limit warning
    editor.use({
      name: 'word-limit-demo',
      onInit(ed) {
        ed.on('change', () => {
          const el = document.querySelector('.oe-word-count');
          if (!el) return;
          const count = parseInt(el.textContent?.replace('Words: ', '') ?? '0');
          el.style.color = count > 100 ? '#ef4444' : '';
        });
      },
    });
  </script>
</body>
</html>
